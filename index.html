<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GitHub Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="card w-96 bg-white-100 shadow-xl p-8 border">
        <div class="flex flex-col items-center text-center">
          <img class=" w:16 h:16 mb-4" src="./assets/github-logo.png" alt="">
            <h2 class="text-2xl text[#64748B] font-bold">GitHub Issues Tracker</h2>
            <p class="text-xs text-gray-500 mb-6">Sign in to manage your issues</p>
        </div>

        <form id="loginForm" class="flex flex-col gap-4">
            <div>
                <label class="label"><span class="label-text font-semibold">Username</span></label>
                <input type="text" id="username" placeholder="Enter Username" class="input bg-white input-bordered w-full"
                    required />
            </div>
            <div>
                <label class="label"><span class="label-text font-semibold">Password</span></label>
                <input type="password" id="password" placeholder="Enter Password" class="input bg-white input-bordered w-full"
                    required />
            </div>
            <p id="error-msg" class="text-red-500 text-sm hidden">Invalid credentials</p>
            <button type="submit"
                class="btn btn-primary w-full bg-blue-600 hover:bg-blue-700 text-white border-none mt-2">Sign
                In</button>
        </form>

        <div class="divider text-gray-400 text-sm mt-6">OR</div>

        <div class="bg-gray-100 p-4 rounded-lg text-center text-sm">
            <p class="font-semibold text-gray-600 mb-1">Demo Credentials:</p>
            <p><strong>Username:</strong> admin</p>
            <p><strong>Password:</strong> admin123</p>
        </div>
    </div>

   <script src="./js/login.js"></script>
</body>

</html>
