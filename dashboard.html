<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white min-h-screen font-sans">

    <div class="navbar bg-white-100 shadow-sm px-8">
        <div class="flex-1">
            <a class="text-xl text-blue-900 font-bold flex items-center gap-2">
                <img src="/assets/github-logo.png" alt="GitHub" class="w-8 h-8 object-contain">
                 <p class="hidden md:block">GitHub Issues Tracker</p>
               
            </a>
            
        </div>
        <div class="flex-none gap-2 shadow-sm">
            <div class="form-control flex-row gap-2">
                <input type="text" id="searchInput" placeholder="Search..."
                    class="input input-bordered bg-white w-24 md:w-auto" />
                <button id="searchBtn" class="btn btn-outline">Search</button>
            </div>
            <button id="logoutBtn" class="btn btn-warning">Logout</button>
        </div>
    </div>

    <main class="p-8 max-w-7xl mx-auto">

        <!-- tab button section  -->
        <div class="flex rounded-lg shadow-md items-center overflow-hidden w-full gap-2 h-20 px-8 mb-2"
            id="tabs-container">
            <button class="tab-btn btn btn-primary px-8  " data-status="All">All</button>
            <button class="tab-btn btn btn-outline btn-primary px-8" data-status="open">Open</button>
            <button class="tab-btn btn btn-outline btn-primary px-8" data-status="closed">Closed</button>
        </div>
        <!-- issue count section  -->
        <div class="flex justify-between items-center rounded-lg shadow-md overflow-hidden w-full gap-2 h-24 px-8 mb-1 bg-white">
        <div>
            <h1 class="text-3xl text-blue-900 font-bold flex items-center gap-3">
                <img src="./assets/Aperture.png" alt="Logo" class="w-8 h-8">
                <span id="issue-count">0</span> Issues
            </h1>
            <p class="text-gray-500">Track and manage your project issues</p>
        </div>
        <!-- issue cstatus section  -->
    <div class="flex items-center gap-4">
        <div class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-green-500"></span>
            <span class="font-medium text-gray-700">Open</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-purple-500"></span>
            <span class="font-medium text-gray-700">Closed</span>
        </div>
    </div>
</div>

        <!-- default loading spineer -->
       <div id="loading-spinner" class="hidden flex flex-col items-center justify-center py-20">
                <span class="loading loading-spinner loading-xl"></span>

        </div>
        <div id="issues-container"  class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 rounded-lg shadow-md bg-white p-5"></div>></div>
         
    </main>
   <!-- modal  -->
   
    <dialog id="issue_modal" class="modal backdrop:bg-black/10">
        <div class="modal-box bg-white w-11/12 max-w-3xl" id="modal-content">
        </div>

        <form method="dialog" class="modal-backdrop">
            <button>close</button>
        </form>
    </dialog>
    <script src="./js/app.js"></script>
</body>

</html>
